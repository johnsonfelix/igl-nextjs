version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - |
          printf "POSTGRES_URL=%s\nPOSTGRES_URL_NON_POOLING=%s\nJWT_SECRET=%s\nDATABASE_URL=%s\nSMTP_HOST=%s\nSMTP_PORT=%s\nSMTP_USER=%s\nSMTP_PASS=%s\nSMTP_FROM=%s\n" "$POSTGRES_URL" "$POSTGRES_URL_NON_POOLING" "$JWT_SECRET" "$DATABASE_URL" "$SMTP_HOST" "$SMTP_PORT" "$SMTP_USER" "$SMTP_PASS" "$SMTP_FROM" > .env.production || true
        - cat .env.production || true
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
